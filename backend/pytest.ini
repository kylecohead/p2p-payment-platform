[pytest]
# Look in tests/ AND the project root (for __mutmut__*.py that mutmut creates)
testpaths = tests .
pythonpath = .
addopts = --cov=src --cov-report=term-missing:skip-covered --no-cov-on-fail
# Ensure mutmut’s temp test files are collected
python_files = test_*.py __mutmut__*.py __mutmut__.py