# GitLab CI/CD Pipeline (Frontend + Backend)

stages:
  - test
  - build

# ----- Shared config / helpers -----
variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

# Reusable rule set for MRs and selected branches
.branch_and_mr_rules: &branch_and_mr_rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(main|dev-frontend|dev-sprint3)$/'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*$/'

# Global caches (scoped per lockfile / branch)
cache:
  # NOTE: job-level caches can override/extend these paths
  key:
    files:
      - frontend/package-lock.json
  paths:
    - .npm/

# ----- Frontend -----

test_frontend:
  stage: test
  image: node:${NODE_VERSION}
  tags: [shared-docker-runner]
  <<: *branch_and_mr_rules
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
      - .npm/
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run test:ci
  # Parse overall coverage from test output
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  # Upload coverage reports and test artifacts so they are visible in CI
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
      junit:
        - frontend/coverage/junit.xml
    paths:
      - frontend/coverage/
    expire_in: 30 days
  only:
    - merge_requests
    - main
    - dev-frontend
    - dev-sprint3
    - /^feature\/.*$/

# Build the application
build:
  stage: build
  image: node:${NODE_VERSION}
  tags: [shared-docker-runner]
  <<: *branch_and_mr_rules
  needs: ["test_frontend"]  # only build FE after tests pass
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/node_modules/
      - .npm/
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  # Artifacts disabled due to registry being full
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - dev-frontend
    - /^feature\/.*$/
