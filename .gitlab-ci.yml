# GitLab CI/CD Pipeline for Frontend Testing

stages:
  - test
  - build

# Define variables
variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

# Cache disabled due to GitLab Artifact Registry being full (maintenance weekend)
# cache:
#   key:
#     files:
#       - frontend/package-lock.json
#   paths:
#     - frontend/node_modules/
#     - .npm/

# Run linting (disabled - will fix on separate branch later)
# lint:
#   stage: test
#   image: node:${NODE_VERSION}
#   tags:
#     - shared-docker-runner
#   script:
#     - cd frontend
#     - npm ci --cache .npm --prefer-offline
#     - npm run lint
#   only:
#     - merge_requests
#     - main
#     - dev-frontend
#     - dev-sprint3
#     - /^feature\/.*$/

# Run unit tests
test:
  stage: test
  image: node:${NODE_VERSION}
  tags:
    - shared-docker-runner
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run test:ci
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  # Artifacts disabled due to registry being full
  # artifacts:
  #   when: always
  #   reports:
  #     coverage_report:
  #       coverage_format: cobertura
  #       path: frontend/coverage/cobertura-coverage.xml
  #     junit:
  #       - frontend/coverage/junit.xml
  #   paths:
  #     - frontend/coverage/
  #   expire_in: 30 days
  only:
    - merge_requests
    - main
    - dev-frontend
    - dev-sprint3
    - /^feature\/.*$/

# Build the application
build:
  stage: build
  image: node:${NODE_VERSION}
  tags:
    - shared-docker-runner
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
    - npm run build
  # Artifacts disabled due to registry being full
  # artifacts:
  #   paths:
  #     - frontend/dist/
  #   expire_in: 1 week
  only:
    - merge_requests
    - main
    - dev-frontend
    - /^feature\/.*$/
