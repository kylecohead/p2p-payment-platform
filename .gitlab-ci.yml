# GitLab CI/CD Pipeline for Backend Testing

stages:
  - test

# Define variables
variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/pip/

# Run backend unit tests (pytest)
backend_tests:
  stage: test
  image: python:${PYTHON_VERSION}
  tags:
    - shared-docker-runner
  before_script:
    - python --version
    - pip install --upgrade pip
    - cd backend
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
  script:
    # JUnit + coverage XML so GitLab can parse results
    - pytest -q --junitxml=pytest-report.xml --cov=src --cov-report=term --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: backend/pytest-report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/pytest-report.xml
      - backend/coverage.xml
    expire_in: 30 days
  only:
    - merge_requests
    - main
    - dev-frontend
    - dev-sprint3
    - /^feature\/.*$/
