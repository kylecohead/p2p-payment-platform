image: alpine:3.20

stages: [lint, test, build]

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NODE_ENV: "ci"

cache:
  paths:
    - .cache/pip
    - backend/.venv

lint:backend:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip ruff==0.6.9
  script:
    - cd backend
    - ruff check .

test:backend:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r backend/requirements.txt
    - pip install pytest pytest-cov httpx
  script:
    - cd backend
    - pytest -q --cov=src --cov-report=xml:coverage.xml --junitxml=pytest-report.xml
  artifacts:
    reports:
      junit: backend/pytest-report.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml

build:backend:
  stage: build
  image: python:3.12-slim
  before_script:
    - cd backend
    - pip install -r requirements.txt
  script:
    - echo "Building backend application..."
  artifacts:
    paths:
      - backend/dist
