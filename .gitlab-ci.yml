# GitLab CI/CD Pipeline for Frontend Testing

stages:
  - install
  - test
  - build

# Define variables
variables:
  NODE_VERSION: "20"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

# Cache node_modules to speed up builds
cache:
  key:
    files:
      - frontend/package-lock.json
  paths:
    - frontend/node_modules/
    - .npm/

# Install dependencies
install_dependencies:
  stage: install
  image: node:${NODE_VERSION}
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  artifacts:
    paths:
      - frontend/node_modules/
    expire_in: 1 hour

# Run linting
lint:
  stage: test
  image: node:${NODE_VERSION}
  dependencies:
    - install_dependencies
  script:
    - cd frontend
    - npm run lint
  only:
    - merge_requests
    - main
    - dev-frontend
    - dev-sprint3

# Run unit tests
test:
  stage: test
  image: node:${NODE_VERSION}
  dependencies:
    - install_dependencies
  script:
    - cd frontend
    - npm run test:ci
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
      junit:
        - frontend/coverage/junit.xml
    paths:
      - frontend/coverage/
    expire_in: 30 days
  only:
    - merge_requests
    - main
    - dev-frontend
    - dev-sprint3

# Build the application
build:
  stage: build
  image: node:${NODE_VERSION}
  dependencies:
    - install_dependencies
  script:
    - cd frontend
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - dev-frontend
